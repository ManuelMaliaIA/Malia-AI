<style>
  :root {
    --primary: #0A4B78;
    --secondary: #F4A259;
    --accent: #2A9D8F;
    --ink: #1A1A1A;
    --paper: #F8F9FA;
    --muted: #6B7280;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: var(--ink);
    background: #ffffff;
  }

  /* ===== Liquid glass ===== */
  .liquid-glass {
    background: rgba(10, 75, 120, 0.30);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.18), 0 10px 30px -10px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.10) 20%,
      rgba(255,255,255,0)    40%, rgba(255,255,255,0)    60%,
      rgba(255,255,255,0.10) 80%, rgba(255,255,255,0.35) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass-light {
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid rgba(10, 75, 120, 0.08);
    box-shadow: 0 1px 0 rgba(255,255,255,1) inset, 0 12px 40px -16px rgba(10,75,120,0.18);
  }

  /* ===== Text shadow for hero text over bright image ===== */
  .text-shadow-soft { text-shadow: 0 2px 14px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.25); }
  .text-shadow-strong { text-shadow: 0 2px 18px rgba(0,0,0,0.55), 0 1px 2px rgba(0,0,0,0.35); }

  /* ===== Hero image — slow Ken-Burns drift ===== */
  .hero-stage { position: absolute; inset: 0; overflow: hidden; }
  .hero-stage::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top,
      rgba(10,30,55,0.55) 0%,
      rgba(10,30,55,0.20) 35%,
      rgba(10,30,55,0.0)  60%);
    pointer-events: none;
    z-index: 1;
  }
  .hero-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 38%;
    transform-origin: 52% 58%;
    animation: kenburns 28s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes kenburns {
    0%   { transform: scale(1.04) translate3d(0,     0,    0); }
    50%  { transform: scale(1.10) translate3d(-1.2%, -0.8%, 0); }
    100% { transform: scale(1.06) translate3d( 1.2%,  0.6%, 0); }
  }
  .hero-shimmer {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: linear-gradient(115deg,
      rgba(255,255,255,0)    35%,
      rgba(255,255,255,0.06) 50%,
      rgba(255,255,255,0)    65%);
    mix-blend-mode: overlay;
    animation: shimmer 14s linear infinite;
    background-size: 300% 300%;
  }
  @keyframes shimmer {
    0%   { background-position:   0% 50%; }
    100% { background-position: 200% 50%; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero-img, .hero-shimmer { animation: none; }
  }

  /* ===== Char anim ===== */
  .char {
    display: inline-block;
    opacity: 0;
    transform: translateX(-18px);
    transition: opacity 500ms ease-out, transform 500ms ease-out;
    will-change: opacity, transform;
  }
  .char.in { opacity: 1; transform: translateX(0); }

  /* ===== Fade up reveal ===== */
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 800ms ease-out, transform 800ms ease-out; }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* ===== Section overline rule ===== */
  .overline { letter-spacing: 0.22em; }

  /* ===== Wave divider ===== */
  .wavy-rule {
    --c: rgba(42,157,143,0.5);
    height: 14px;
    background:
      radial-gradient(circle at 7px 14px, transparent 7px, var(--c) 7.5px, transparent 8.5px) repeat-x;
    background-size: 14px 14px;
    mask: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
  }

  /* ===== Marquee for trust strip ===== */
  @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: drift 38s linear infinite; }

  /* ===== Audio bars (visual only) ===== */
  @keyframes bar { 0%,100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
  .bar { display:inline-block; width:3px; height:22px; margin:0 1.5px; background: currentColor; border-radius:2px; transform-origin: center; animation: bar 1.1s ease-in-out infinite; }

  /* ===== Pricing highlight ring ===== */
  .ring-malia { box-shadow: 0 0 0 1.5px var(--primary), 0 22px 60px -24px rgba(10,75,120,0.45); }

  /* ===== Selection ===== */
  ::selection { background: rgba(244, 162, 89, 0.35); color: var(--ink); }

  /* ===== Tiny dot grid ===== */
  .dot-grid {
    background-image: radial-gradient(rgba(10,75,120,0.18) 1px, transparent 1.2px);
    background-size: 18px 18px;
  }

  /* ===== Phone frame ===== */
  .phone-frame {
    background: linear-gradient(180deg, #0f1a24 0%, #1a2a3a 100%);
    border-radius: 38px;
    padding: 10px;
    box-shadow: 0 30px 60px -20px rgba(10,30,55,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset;
  }
  .phone-screen {
    background: #ffffff;
    border-radius: 28px;
    overflow: hidden;
    aspect-ratio: 9/19;
    width: 100%;
    position: relative;
  }

  /* ===== Subtle map-like SVG bg for footer ===== */
  .topo {
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(42,157,143,0.10), transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(244,162,89,0.10), transparent 55%);
  }

  /* ===== Plus button ring ===== */
  .pulse-ring { position: relative; }
  .pulse-ring::after {
    content:'';
    position:absolute; inset:-6px; border-radius:9999px;
    border: 1.5px solid currentColor; opacity:.35;
    animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse { 0% { transform: scale(0.85); opacity:.55; } 100% { transform: scale(1.5); opacity:0; } }

  /* ===== Code-like chip ===== */
  .chip-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.04em; }

  /* ===== Underline rule ===== */
  .rule-thin { height: 1px; background: linear-gradient(90deg, transparent, rgba(10,75,120,0.25), transparent); }

  /* ===== Carousel fade ===== */
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .demo-fade { animation: fadeSlide 0.22s ease-out; }

  /* ===== ROI calculator slider ===== */
  .roi-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 999px;
    background: linear-gradient(to right,
      var(--primary) 0%,
      var(--primary) var(--pct, 50%),
      rgba(10,75,120,0.12) var(--pct, 50%),
      rgba(10,75,120,0.12) 100%);
    outline: none;
    cursor: pointer;
  }
  .roi-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    border: 4px solid #fff;
    box-shadow: 0 4px 12px rgba(10,75,120,0.35);
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .roi-slider::-webkit-slider-thumb:hover { transform: scale(1.1); }
  .roi-slider::-webkit-slider-thumb:active { transform: scale(0.95); }
  .roi-slider::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--primary);
    border: 4px solid #fff;
    box-shadow: 0 4px 12px rgba(10,75,120,0.35);
    cursor: pointer;
  }
  @keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 12px rgba(42,157,143,0.25)); }
    50%      { filter: drop-shadow(0 0 24px rgba(42,157,143,0.55)); }
  }
  .roi-glow { animation: glow 2.6s ease-in-out infinite; }
</style>
